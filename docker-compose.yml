version: "3.8"

services:
  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:password@postgres:5432/fishbot
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBAPP_URL: ${WEBAPP_URL:-}
      APP_DOMAIN: ${APP_DOMAIN:-}
      RAILWAY_PUBLIC_DOMAIN: ${RAILWAY_PUBLIC_DOMAIN:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-telegram-webhook}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8080}
      BOT_INTERNAL_WEBHOOK_PORT: ${BOT_INTERNAL_WEBHOOK_PORT:-9000}
      BOT_USE_WEBHOOK: ${BOT_USE_WEBHOOK:-1}
      TG_CONNECTION_POOL_SIZE: ${TG_CONNECTION_POOL_SIZE:-256}
      TG_POOL_TIMEOUT: ${TG_POOL_TIMEOUT:-60}
      TG_READ_TIMEOUT: ${TG_READ_TIMEOUT:-60}
      TG_WRITE_TIMEOUT: ${TG_WRITE_TIMEOUT:-60}
      TG_CONNECT_TIMEOUT: ${TG_CONNECT_TIMEOUT:-30}
      TG_SEND_SEMAPHORE_LIMIT: ${TG_SEND_SEMAPHORE_LIMIT:-50}
      TG_API_CALL_TIMEOUT: ${TG_API_CALL_TIMEOUT:-12}
      WEBHOOK_PROXY_WORKERS: ${WEBHOOK_PROXY_WORKERS:-128}
      WEBHOOK_PROXY_TIMEOUT: ${WEBHOOK_PROXY_TIMEOUT:-2}
      TOUR_CACHE_TTL_SECONDS: ${TOUR_CACHE_TTL_SECONDS:-10}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fishbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
