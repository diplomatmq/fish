<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="theme-color" content="#0a4f76" />
  <title>Fish Mini App</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <div class="waves" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <header class="profile-header">
      <div class="player-line">
        <div class="avatar">🎣</div>
        <div class="player-meta">
          <p id="username" class="username">@angler</p>
          <p id="title" class="title">Морской охотник</p>
        </div>
      </div>

      <div class="stats-grid">
        <article class="chip">
          <span>Уровень</span>
          <strong id="level">1</strong>
        </article>
        <article class="chip">
          <span>XP</span>
          <strong id="xp">0</strong>
        </article>
        <article class="chip">
          <span>Монеты</span>
          <strong id="coins">0</strong>
        </article>
      </div>
    </header>

    <main class="main-panel">
      <section id="view-profile" class="view active">
        <article class="card">
          <h2>Трофеи</h2>
          <p class="subtext">Выберите активный трофей для профиля.</p>

          <label class="field-label" for="trophySelect">Активный трофей</label>
          <div class="trophy-row">
            <select id="trophySelect" class="input"></select>
            <button id="saveTrophy" class="btn">Сохранить</button>
          </div>
          <p id="trophyStatus" class="status">Ожидание выбора...</p>
        </article>

        <article class="card">
          <h3>Прогресс опыта</h3>
          <div class="track">
            <div id="xpFill" class="fill" style="width: 0%"></div>
          </div>
          <p id="xpInfo" class="subtext">До следующего уровня: 0 XP</p>
        </article>
      </section>

      <section id="view-character" class="view">
        <article class="card character-card">
          <h2>Персонаж</h2>
          <div id="characterCanvas" class="character-canvas"></div>
          <p id="characterStatus" class="status character-status">Ожидание загрузки 3D...</p>
          <p class="subtext">
            Если добавить файл <strong>fisherman.glb</strong> в /static/models/, он заменит встроенного рыбака.
          </p>
        </article>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-view="profile" class="tab active">Профиль</button>
      <button data-view="character" class="tab">Персонаж</button>
    </nav>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
